feature_weights:
  type: class
  # class_name: "FeatureWeightedExtractor"
  # params:
  #   no_features:
  #     type: data_ref
  #     value: "no_features"
  class_name: "MLPExtractor"
  params:
    input_size:
      type: data_ref
      value: "no_features"
    hidden_sizes:
      type: list
      value: [{ type: value, value: 10 }, {type: value, value: 20}, {type: value, value: 10}]
    output_size:
      type: value
      value: 1

scaler:
  type: class
  class_name: "Scaler"
  params:
    no_features:
      type: data_ref
      value: "no_features"

semantics:
  type: class
  class_name: "ReluSemantics"
  params:
    max_iters:
      type: ref
      value: max_iters
    epsilon:
      type: ref
      value: epsilon

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value: [{ type: ref, value: "feature_weights" }]
    comparison_func:
      type: class
      class_name: "Subtractor"
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: "sigmoid"

irrelevance:
  type: class
  class_name: "RegularIrrelevance"
  params:
    compute_partial_order:
      type: ref
      value: "partial_order"

base_score:
  type: class
  class_name: "LearnedBaseScore"
  params:
    feature_extractors:
      type: list
      value:
        [
          { type: ref, value: "feature_weights" },
          { type: ref, value: "scaler" },
        ]
    activation:
      type: function
      value: "sigmoid"

model:
  type: class
  class_name: "GradualAACBR"
  params:
    gradual_semantics:
      type: ref
      value: "semantics"
    compute_base_score:
      type: ref
      value: "base_score"
    irrelevance_edge_weights:
      type: ref
      value: "irrelevance"
    casebase_edge_weights:
      type: ref
      value: "partial_order"
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: "identity"
      # value: "uni_directional"
