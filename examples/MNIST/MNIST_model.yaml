community_preservation_attacks:
  type: class
  class_name: CommunityPreservationRegulariser
  params:
    filter_func:
      type: function
      value: "filter_to_attacks"

community_preservation_supports:
  type: class
  class_name: CommunityPreservationRegulariser
  params:
    filter_func:
      type: function
      value: "filter_to_supports"

dag_regulariser:
  type: class
  class_name: DAGRegulariser

sparsity_regulariser:
  type: class
  class_name: SparsityRegulariser

regularisers:
  type: class
  class_name: "RegulariserList"
  params:
    regularisers:
      type: list
      value:
        [
          {
            type: list,
            value:
              [
                { type: ref, value: "sparsity_regulariser" },
                { type: ref, value: gamma_sparse },
              ],
          },
          # {
          #   type: list,
          #   value:
          #     [
          #       { type: ref, value: "community_preservation_attacks" },
          #       { type: ref, value: gamma },
          #     ],
          # },
          # {
          #   type: list,
          #   value:
          #     [
          #       { type: ref, value: "community_preservation_supports" },
          #       { type: ref, value: gamma_prime },
          #     ],
          # },
          {
            type: list,
            value:
              [
                { type: ref, value: "dag_regulariser" },
                { type: ref, value: gamma_dag },
              ],
          },
        ]

trainer:
  type: class
  class_name: "SimpleTrainer"
