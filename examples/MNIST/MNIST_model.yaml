build_casebase:
  type: class
  class_name: "kMeansCluster"
  params:
    cluster_size:
      type: ref
      value: cluster_size

train_settings:
  type: dict
  value:
    criterion_factory:
      type: function
      value: "cross_entropy"
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: "AdamW"
      model: "model"
      params:
        lr:
          type: ref
          value: lr
    regulariser:
      type: ref
      value: "regularisers"

      

