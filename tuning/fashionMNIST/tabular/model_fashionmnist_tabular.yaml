dag_regulariser:
  type: class
  class_name: DAGRegulariser
  params:
    alpha:
      type: ref
      value: dag_alpha
regularisers:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
      - type: list
        value:
        - type: ref
          value: attacks_defaults_regulariser
        - type: value
          value: 1.0
      - type: list
        value:
        - type: ref
          value: dag_regulariser
        - type: ref
          value: gamma_dag
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: class
      class_name: TorchLoss
      params:
        class_name:
          type: value
          value: CrossEntropyLoss
        label_smoothing:
          type: value
          value: 0.05
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: value
          value: 0.0004
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: value
      value: 7680
    gradient_max_norm:
      type: value
      value: 1.0
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog
build_casebase:
  type: class
  class_name: kMeansCluster
  params:
    cluster_size:
      type: ref
      value: cluster_size
build_new_cases:
  type: function
  value: use_train
feature_weights:
  type: class
  class_name: MLPExtractor
  params:
    input_size:
      type: data_ref
      value: no_features
    hidden_sizes:
      type: ref
      value: mlp_hidden_sizes
    output_size:
      type: value
      value: 1
scaler:
  type: class
  class_name: Scaler
  params:
    no_features:
      type: data_ref
      value: no_features
semantics:
  type: class
  class_name: ReluSemantics
  params:
    max_iters:
      type: ref
      value: max_iters
    epsilon:
      type: ref
      value: epsilon
partial_order:
  type: class
  class_name: LearnedPartialOrder
  params:
    feature_extractors:
      type: list
      value:
      - type: ref
        value: feature_weights
    comparison_func:
      type: class
      class_name: Subtractor
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: sigmoid
irrelevance:
  type: class
  class_name: RegularIrrelevance
  params:
    compute_partial_order:
      type: ref
      value: partial_order
base_score:
  type: class
  class_name: LearnedBaseScore
  params:
    feature_extractors:
      type: list
      value:
      - type: ref
        value: feature_weights
      - type: ref
        value: scaler
    activation:
      type: function
      value: sigmoid
model:
  type: class
  class_name: GradualAACBR
  params:
    gradual_semantics:
      type: ref
      value: semantics
    compute_base_score:
      type: ref
      value: base_score
    irrelevance_edge_weights:
      type: ref
      value: irrelevance
    casebase_edge_weights:
      type: ref
      value: partial_order
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: identity
attacks_defaults_regulariser:
  type: class
  class_name: AttackDefaultsRegulariser
