epochs:
  type: value
  value: 256

lr:
  type: value
  value: 0.0001

batch_size:
  type: value
  value: 256

gradient_max_norm:
  type: value
  value: 0.1

weight_decay:
  type: value
  value: 0.00011057236575274206

label_smoothing:
  type: value
  value: 0.0

lstm_input_size:
  type: value
  value: 1

lstm_hidden_size:
  type: value
  value: 32

lstm_num_layers:
  type: value
  value: 1

lstm_bidirectional:
  type: value
  value: false

lstm_dropout:
  type: value
  value: 0.0

# ====================== Regulariser =======================

regularisers:
  type: class
  class_name: CriterionList

# ====================== LOSSES ======================
cross_entropy:
  type: class
  class_name: TorchLoss
  params:
    class_name:
      type: value
      value: CrossEntropyLoss
    label_smoothing:
      type: ref
      value: label_smoothing
    weight:
      type: tensor
      value:
        - type: value
          value: 1.22
        - type: value
          value: 0.867


losses:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: cross_entropy
            - type: value
              value: 1

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: "IdentityCluster"

build_new_cases:
  type: function
  value: "use_train"

# ====================== MODEL =======================

model:
  type: class
  class_name: LSTMBaseline
  params:
    input_size:
      type: ref
      value: lstm_input_size
    hidden_size:
      type: ref
      value: lstm_hidden_size
    output_features:
      type: value
      value: 2
    num_layers:
      type: ref
      value: lstm_num_layers
    bidirectional:
      type: ref
      value: lstm_bidirectional
    dropout:
      type: ref
      value: lstm_dropout
