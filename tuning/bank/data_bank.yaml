data:
  type: data
  sub_type: tabular
  params:
    target_field:
      type: value
      value: 16
    path:
      type: value
      value: "./data/bank/bank-full.csv"
    has_header:
      type: value
      value: true
    sep:
      type: value
      value: ";"
    categorical_cols:
      type: list
      value:
        - { type: value, value: 1 }
        - { type: value, value: 2 }
        - { type: value, value: 3 }
        - { type: value, value: 4 }
        - { type: value, value: 6 }
        - { type: value, value: 7 }
        - { type: value, value: 8 }
        - { type: value, value: 10 }
        - { type: value, value: 15 }

    continuous_cols:
      type: list
      value:
        - { type: value, value: 0 }
        - { type: value, value: 5 }
        - { type: value, value: 9 }
        - { type: value, value: 11 }
        - { type: value, value: 12 }
        - { type: value, value: 13 }
        - { type: value, value: 14 }


data_pre_process:
  type: dict
  value:
    pre_process_func:
      type: function
      value: "no_normalize"
