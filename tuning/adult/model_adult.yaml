dag_regulariser:
  type: class
  class_name: DAGRegulariser
  params:
    alpha:
      type: ref
      value: dag_alpha

class_balance_regulariser:
  type: class
  class_name: "ClassBalanceRegulariser"

sparsity_regulariser:
  type: class
  class_name: SparsityRegulariser

community_preservation_regulariser:
  type: class
  class_name: CommunityPreservationRegulariser
  params:
    method:
      type: value
      value: "fro"

regularisers:
  type: class
  class_name: "RegulariserList"
  params:
    regularisers:
      type: list
      value:
        [
          {
            type: list,
            value:
              [
                { type: ref, value: "dag_regulariser" },
                { type: ref, value: gamma_dag },
              ],
          },
          {
            type: list,
            value:
              [
                { type: ref, value: "class_balance_regulariser" },
                { type: ref, value: gamma_cbr },
              ],
          },
          {
            type: list,
            value:
              [
                { type: ref, value: "sparsity_regulariser" },
                { type: ref, value: gamma_sparsity },
              ],
          },
          {
            type: list,
            value:
              [
                { type: ref, value: "community_preservation_regulariser" },
                { type: ref, value: gamma_cp },
              ],
          },
        ]

cross_entropy:
  type: class
  class_name: "CrossEntropyLoss"
  params:
    label_smoothing:
      type: ref
      value: "label_smoothing"
    weight:
      type: tensor
      value:
        # - {type: value, value: 2.63}
        # - {type: value, value: 8.36}
        - {type: value, value: 1.62}
        - {type: value, value: 2.89}


batch_entropy:
  type: class
  class_name: "BatchEntropyRegularisation"

losses:
  type: class
  class_name: "LossList"
  params:
    losses:
      type: list
      value:
        - {
            type: list,
            value:
              [
                { type: ref, value: "cross_entropy" },
                { type: value, value: 1 },
              ],
          }
        - {
            type: list,
            value:
              [
                { type: ref, value: "batch_entropy" },
                { type: ref, value: gamma_batch_entropy },
              ],
          }

trainer:
  type: class
  class_name: "SimpleTrainer"

build_casebase:
  type: class
  class_name: "kMeansCluster"
  params:
    cluster_size:
      type: ref
      value: cluster_size
    nearest_sample:
      type: value
      value: True

build_new_cases:
  type: function
  value: "use_train"

train_settings:
  type: dict
  value:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: "AdamW"
      model: "model"
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: "weight_decay"
    regulariser:
      type: ref
      value: "regularisers"
    batch_size:
      type: ref
      value: "batch_size"
    gradient_max_norm:
      type: ref
      value: "gradient_max_norm"

feature_weights:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: data_ref
      value: "no_features"
    hidden_sizes:
      type: list
      value:
        [
          { type: ref, value: first_layer },
          { type: ref, value: second_layer },
          { type: ref, value: third_layer },
        ]
    output_size:
      type: value
      value: 64

feature_weights_1:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: data_ref
      value: "no_features"
    hidden_sizes:
      type: list
      value:
        [
          { type: ref, value: first_layer },
          { type: ref, value: second_layer },
          { type: ref, value: third_layer },
        ]
    output_size:
      type: value
      value: 1

semantics:
  type: class
  class_name: "ReluSemantics"
  params:
    max_iters:
      type: ref
      value: max_iters

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value: [{ type: ref, value: "feature_weights" }]
    comparison_func:
      type: class
      class_name: "SoftCoordinateDominance"
      params:
        temperature:
          type: ref
          value: temperature
        noise_value:
          type: ref
          value: noise_value

irrelevance:
  type: class
  class_name: "RegularIrrelevance"
  params:
    compute_partial_order:
      type: ref
      value: "partial_order"

# base_score:
#   type: class
#   class_name: "LearnedBaseScore"
#   params:
#     feature_extractors:
#       type: list
#       value:
#         [
#           { type: ref, value: "feature_weights_1" },
#         ]
#     activation:
#       type: function
#       value: "sigmoid"

base_score:
  type: class
  class_name: "ConstantBaseScore"
  params:
    constant: 
      type: value
      value: 1.0

model:
  type: class
  class_name: "GradualAACBR"
  params:
    gradual_semantics:
      type: ref
      value: "semantics"
    compute_base_score:
      type: ref
      value: "base_score"
    irrelevance_edge_weights:
      type: ref
      value: "irrelevance"
    casebase_edge_weights:
      type: ref
      value: "partial_order"
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: "identity"
    rescale_edges:
      type: ref
      value: rescale_edges
    t_norm_str:
      type: ref
      value: t_norm_str
    rand_weight:
      type: ref
      value: rand_weight
