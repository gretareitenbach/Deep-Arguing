epochs:
  type: value
  value: 10

lr:
  type: value
  value: 0.003

batch_size:
  type: value
  value: 256

gradient_max_norm:
  type: value
  value: 3.0

weight_decay:
  type: value
  value: 0.001

label_smoothing:
  type: value
  value: 0.0

# ====================== Regulariser =======================

regularisers:
  type: class
  class_name: CriterionList

# ====================== LOSSES ======================
cross_entropy:
  type: class
  class_name: TorchLoss
  params:
    class_name:
      type: value
      value: CrossEntropyLoss
    label_smoothing:
      type: ref
      value: label_smoothing

losses:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: cross_entropy
            - type: value
              value: 1

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: "IdentityCluster"

build_new_cases:
  type: function
  value: "use_train"

# ====================== MODEL =======================

model:
  type: class
  class_name: SimpleCNNBaseline
  params:
    in_channels:
      type: value
      value: 1
    output_features:
      type: value
      value: 10
