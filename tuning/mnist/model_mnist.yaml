# =================== REGULARISERS ===================
dag_regulariser:
  type: class
  class_name: DAGRegulariser
  params:
    alpha:
      type: ref
      value: dag_alpha

attacks_defaults_regulariser:
  type: class
  class_name: AttackDefaultsRegulariser

sparsity_regulariser:
  type: class
  class_name: SparsityRegulariser

irrelevance_sparsity_regulariser:
  type: class
  class_name: IrrelevanceSparsityRegulariser

regularisers:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: attacks_defaults_regulariser
            - type: value
              value: 1.0
        - type: list
          value:
            - type: ref
              value: dag_regulariser
            - type: ref
              value: gamma_dag
        - type: list
          value:
            - type: ref
              value: sparsity_regulariser
            - type: ref
              value: gamma_sparsity
        - type: list
          value:
            - type: ref
              value: irrelevance_sparsity_regulariser
            - type: ref
              value: gamma_irrelevance_sparsity

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: class
      class_name: TorchLoss
      params:
        class_name:
          type: value
          value: CrossEntropyLoss
        label_smoothing:
          type: value
          value: 0.05
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: kMeansCluster
  params:
    cluster_size:
      type: ref
      value: cluster_size

build_new_cases:
  type: function
  value: use_train

# ================ FEATURE EXTRACTORS ================
shared_weights:
  type: class
  class_name: SimpleCNN
  params:
    # weights_path: 
    #   type: value
    #   value: "simple_cnn_64.pt"
    # freeze_weights:
    #   type: value
    #   value: true
    freeze_bn:
      type: value
      value: true
    output_features:
      type: value
      value: 64

feature_weights_1:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    hidden_sizes:
      type: list
      value:
        [
          { type: ref, value: first_layer },
          { type: ref, value: second_layer },
          { type: ref, value: third_layer },
        ]
    output_size:
      type: value
      value: 128

feature_weights_2:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    hidden_sizes:
      type: list
      value:
        [
          { type: ref, value: first_layer },
          { type: ref, value: second_layer },
          { type: ref, value: third_layer },
        ]
    output_size:
      type: value
      value: 1

# ====================== MODEL =======================
semantics:
  type: class
  class_name: ReluSemantics
  params:
    max_iters:
      type: ref
      value: max_iters
    epsilon:
      type: ref
      value: epsilon

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value:
        [
          { type: ref, value: "shared_weights" },
          { type: ref, value: "feature_weights_1" },
        ]
    comparison_func:
      type: class
      class_name: "SoftCoordinateDominance"
      params:
        temperature:
          type: ref
          value: temperature

irrelevance:
  type: class
  class_name: RegularIrrelevance
  params:
    compute_partial_order:
      type: ref
      value: partial_order

base_score:
  type: class
  class_name: "LearnedBaseScore"
  params:
    feature_extractors:
      type: list
      value: [
          { type: ref, value: "shared_weights" },
          { type: ref, value: "feature_weights_2" },
        ]
    activation:
      type: function
      value: "sigmoid"

model:
  type: class
  class_name: GradualAACBR
  params:
    gradual_semantics:
      type: ref
      value: semantics
    compute_base_score:
      type: ref
      value: base_score
    irrelevance_edge_weights:
      type: ref
      value: irrelevance
    casebase_edge_weights:
      type: ref
      value: partial_order
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: identity
    t_norm_str:
      type: ref
      value: t_norm_str

