epochs:
  type: value
  value: 32

lr:
  type: value
  value: 0.003

max_iters:
  type: value
  value: 5

batch_size:
  type: value
  value: 64

gradient_max_norm:
  type: value
  value: 3.0

weight_decay:
  type: value
  value: 0.0001


label_smoothing:
  type: value
  value: 0.000


# =================== REGULARISERS ===================

community_preservation_regulariser:
  type: class
  class_name: CommunityPreservationRegulariser

regularisers:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: community_preservation_regulariser
            - type: value
              value: 0.005
        

# ====================== LOSSES ======================
cross_entropy:
  type: class
  class_name: TorchLoss
  params:
    class_name:
      type: value
      value: CrossEntropyLoss
    label_smoothing:
      type: ref
      value: label_smoothing

losses:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: cross_entropy
            - type: value
              value: 1

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: IdentityCluster


build_new_cases:
  type: function
  value: use_train

# ================ FEATURE EXTRACTORS ================
shared_weights:
  type: class
  class_name: MLPExtractor
  params:
    input_size:
      type: data_ref
      value: no_features
    hidden_sizes:
      type: list
      value: []
    output_size:
      type: value
      value: 1

scaler:
  type: class
  class_name: Scaler
  params:
    no_features:
      type: value
      value: 1


# ====================== MODEL =======================
semantics:
  type: class
  class_name: ReluSemantics
  params:
    max_iters:
      type: ref
      value: max_iters

partial_order:
  type: class
  class_name: LearnedPartialOrder
  params:
    feature_extractors:
      type: list
      value:
        - type: ref
          value: shared_weights
    comparison_func:
      type: class
      class_name: Subtractor
      params:
        temperature:
          type: value
          value: 0.05
        activation:
          type: function
          value: sigmoid



irrelevance:
  type: class
  class_name: RegularIrrelevance
  params:
    compute_partial_order:
      type: ref
      value: partial_order

base_score:
  type: class
  class_name: LearnedBaseScore
  params:
    feature_extractors:
      type: list
      value:
        - type: ref
          value: shared_weights
        - type: ref
          value: scaler
    activation:
      type: function
      value: sigmoid

model:
  type: class
  class_name: GradualAACBR
  params:
    gradual_semantics:
      type: ref
      value: semantics
    compute_base_score:
      type: ref
      value: base_score
    irrelevance_edge_weights:
      type: ref
      value: irrelevance
    casebase_edge_weights:
      type: ref
      value: partial_order
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: identity
