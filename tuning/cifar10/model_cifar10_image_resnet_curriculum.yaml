# Curriculum learning configuration for CIFAR10 with ResNet
# AGGRESSIVE configuration optimized for maximum accuracy
#
# Key changes from conservative config:
# - Deeper, wider MLP for handling class complexity
# - More clusters for richer casebase representation
# - Stronger regularization for knowledge retention
# - Optimized graph construction parameters

# =============================================================================
# Curriculum Learning Components
# =============================================================================

curriculum_strategy:
  type: class
  # class_name: "FixedEpochsCurriculum"
  class_name: "PerformanceBasedCurriculum"
  params:
    class_order:
      type: list
      value:
        - { type: value, value: 0 }
        - { type: value, value: 1 }
        - { type: value, value: 2 }
        - { type: value, value: 3 }
        - { type: value, value: 4 }
        - { type: value, value: 5 }
        - { type: value, value: 6 }
        - { type: value, value: 7 }
        - { type: value, value: 8 }
        - { type: value, value: 9 }
    # epochs_per_class:
    #   type: ref
    #   value: epochs_per_class
    max_epochs_per_class:
      type: ref
      value: max_epochs_per_class
    min_epochs_per_class:
      type: ref
      value: min_epochs_per_class
    accuracy_threshold:
      type: ref
      value: accuracy_threshold
    initial_classes:
      type: ref
      value: initial_classes

data_selector:
  type: class
  class_name: "WeightedDataSelector"
  params:
    new_class_weight:
      type: ref
      value: new_class_weight
    decay_epochs:
      type: ref
      value: decay_epochs

# =============================================================================
# Regularisation - Stronger for knowledge retention
# =============================================================================

dag_regulariser:
  type: class
  class_name: DAGRegulariser
  params:
    alpha:
      type: ref
      value: dag_alpha

# Sparsity regulariser to prevent graph explosion
# sparsity_regulariser:
#   type: class
#   class_name: SparsityRegulariser

regularisers:
  type: class
  class_name: "RegulariserList"
  params:
    regularisers:
      type: list
      value:
        [
          {
            type: list,
            value:
              [
                { type: ref, value: "dag_regulariser" },
                { type: ref, value: gamma_dag },
              ],
          },
          # {
          #   type: list,
          #   value:
          #     [
          #       { type: ref, value: "sparsity_regulariser" },
          #       { type: value, value: 0.001 },  # Light sparsity
          #     ],
          # },
        ]

# =============================================================================
# Trainer
# =============================================================================

trainer:
  type: class
  class_name: "CurriculumTrainer"
  params:
    curriculum_strategy:
      type: ref
      value: curriculum_strategy
    data_selector:
      type: ref
      value: data_selector
    reset_optimizer_on_advance:
      type: ref
      value: reset_optimizer

# =============================================================================
# Casebase and New Cases
# =============================================================================

build_casebase:
  type: class
  class_name: "kMeansCluster"
  params:
    cluster_size:
      type: ref
      value: cluster_size

build_new_cases:
  type: function
  value: "use_train"

# =============================================================================
# Training Settings
# =============================================================================

train_settings:
  type: dict
  value:
    criterion:
      type: class
      class_name: "CrossEntropyLoss"
      params:
        label_smoothing:
          type: ref
          value: "label_smoothing"
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: "AdamW"
      model: "model"
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: "weight_decay"
        # betas:
        #   type: list
        #   value:
        #     - { type: value, value: 0.9 }
        #     - { type: value, value: 0.98 }  # Higher beta2 for stability
    scheduler:
      type: class
    #   class_name: "CosineAnnealingWarmRestarts"
    #   sub_type: scheduler
    #   optimizer: "optimizer"
    #   params:
    #     T_0:
    #       type: ref
    #       value: epochs_per_class
    #     T_mult:
    #       type: value
    #       value: 1  # Keep restart period constant
    #     eta_min:
    #       type: value
    #       value: 0.0001
      class_name: "LinearLR"
      sub_type: scheduler
      optimizer: "optimizer"
      params:
        start_factor:
          type: value
          value: 0.005 
        total_iters:
          type: ref
          value: epochs
    regulariser:
      type: ref
      value: "regularisers"
    batch_size:
      type: ref
      value: "batch_size"
    gradient_max_norm:
      type: ref
      value: "gradient_max_norm"
    scheduler_step_per:
      type: value
      value: "epoch"

# =============================================================================
# Feature Extraction - Deeper and Wider
# =============================================================================

# Frozen ResNet for feature extraction
feature_weights:
  type: class
  class_name: "ResNetCIFAR"
  params:
    weights_path:
      type: value
      value: "resnet_30.pt"
    freeze_weights:
      type: value
      value: True

# Deeper MLP with residual-style architecture
# 64 -> 64 -> 48 -> 32 -> dimensions
feature_weights_1:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    hidden_sizes:
      type: list
      value:
        [
          # { type: value, value: 64 },   # Same as input - residual-like
          { type: value, value: 32 },
          { type: value, value: 16 },
        ]
    output_size:
      type: ref
      value: dimensions

# =============================================================================
# Semantics
# =============================================================================

semantics:
  type: class
  class_name: "ReluSemantics"
  params:
    max_iters:
      type: ref
      value: max_iters

# =============================================================================
# Partial Order and Irrelevance
# =============================================================================

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value:
        [
          { type: ref, value: "feature_weights" },
          { type: ref, value: "feature_weights_1" },
        ]
    comparison_func:
      type: class
      class_name: "Subtractor"
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: "sigmoid"

irrelevance:
  type: class
  class_name: "RegularIrrelevance"
  params:
    compute_partial_order:
      type: ref
      value: "partial_order"

# =============================================================================
# Base Score (Constant - unchanged as requested)
# =============================================================================

base_score:
  type: class
  class_name: "ConstantBaseScore"
  params:
    constant:
      type: value
      value: 0.5
    dim:
      type: ref
      value: dimensions

# =============================================================================
# Model
# =============================================================================

model:
  type: class
  class_name: "GradualAACBR"
  params:
    gradual_semantics:
      type: ref
      value: "semantics"
    compute_base_score:
      type: ref
      value: "base_score"
    irrelevance_edge_weights:
      type: ref
      value: "irrelevance"
    casebase_edge_weights:
      type: ref
      value: "partial_order"
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: "identity"
    dimensions:
      type: ref
      value: dimensions
