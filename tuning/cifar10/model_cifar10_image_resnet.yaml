semantics:
  type: class
  class_name: "ReluSemantics"
  params:
    max_iters:
      type: ref
      value: max_iters

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value:
        [
          { type: ref, value: "feature_weights" },
          { type: ref, value: "feature_weights_1" },
        ]
    comparison_func:
      type: class
      class_name: "Subtractor"
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: "sigmoid"

irrelevance:
  type: class
  class_name: "RegularIrrelevance"
  params:
    compute_partial_order:
      type: ref
      value: "partial_order"

base_score:
  type: class
  class_name: "ConstantBaseScore"
  params:
    constant:
      type: value
      value: 0.5
    dim:
      type: ref
      value: dimensions

