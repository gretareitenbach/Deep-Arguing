feature_weights:
  type: class
  class_name: "ResNetCIFAR"
  params:
    weights_path:
      type: value
      value: "resnet_30.pt"
    freeze_weights:
      type: value
      value: True

feature_weights_1:
  type: class
  class_name: "MLPExtractor"
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    hidden_sizes:
      type: list
      value: [
          # { type: value, value: 48 },
          { type: value, value: 32 },
          { type: value, value: 16 },
          # { type: value, value: 8 },
        ]
    output_size:
      type: ref
      value: dimensions

