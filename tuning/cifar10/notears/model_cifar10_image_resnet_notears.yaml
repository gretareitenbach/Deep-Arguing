epochs:
  type: value
  value: 12

outer_iterations:
  type: value
  value: 25

lr:
  type: value
  value: 0.008

max_iters:
  type: value
  value: 60

temperature:
  type: value
  value: 5

cluster_size:
  type: value
  value: 5

batch_size:
  type: value
  value: 256

gradient_max_norm:
  type: value
  value: 5.0

weight_decay:
  type: value
  value: 0.004

label_smoothing:
  type: value
  value: 0.1

dimensions:
  type: value
  value: 16

batch_norm:
  type: value
  value: true

dropout:
  type: value
  value: 0.15

eta_min:
  type: value
  value: 0.0001

scheduler_t0:
  type: value
  value: 5

scheduler_t_mult:
  type: value
  value: 2

# =================== REGULARISERS ===================
notears_regulariser:
  type: class
  class_name: NOTEARSRegulariser
  params:
    lambda_init:
      type: value
      value: 0.0
    rho_init:
      type: value
      value: 0.1
    rho_max:
      type: value
      value: 1.0e+16
    rho_factor:
      type: value
      value: 2.0
    gamma:
      type: value
      value: 0.25
    h_tolerance:
      type: value
      value: 1.0e-05

sparsity_regulariser:
  type: class
  class_name: SparsityRegulariser

connectivity_regulariser:
  type: class
  class_name: ConnectivityRegulariser

regularisers:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: attacks_defaults_regulariser
            - type: value
              value: 1.0
        - type: list
          value:
            - type: ref
              value: notears_regulariser
            - type: value
              value: 1.0
        - type: list
          value:
            - type: ref
              value: sparsity_regulariser
            - type: value
              value: 0.002
        - type: list
          value:
            - type: ref
              value: connectivity_regulariser
            - type: value
              value: 0.0005

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: TwoLevelTrainer
  params:
    criterion:
      type: class
      class_name: TorchLoss
      params:
        class_name:
          type: value
          value: CrossEntropyLoss
        label_smoothing:
          type: ref
          value: label_smoothing
    epochs:
      type: ref
      value: epochs
    outer_iterations:
      type: ref
      value: outer_iterations
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    scheduler:
      type: class
      class_name: CosineAnnealingWarmRestarts
      sub_type: scheduler
      optimizer: optimizer
      params:
        T_0:
          type: ref
          value: scheduler_t0
        T_mult:
          type: ref
          value: scheduler_t_mult
        eta_min:
          type: ref
          value: eta_min
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    scheduler_step_per:
      type: value
      value: outer
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: kMeansCluster
  params:
    cluster_size:
      type: ref
      value: cluster_size

build_new_cases:
  type: function
  value: use_train

# ================ FEATURE EXTRACTORS ================
feature_weights:
  type: class
  class_name: ResNetCIFAR
  params:
    weights_path:
      type: value
      value: resnet_30.pt
    freeze_weights:
      type: value
      value: true

partial_order_mlp:
  type: class
  class_name: MLPExtractor
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    dropout:
      type: ref
      value: dropout
    hidden_sizes:
      type: list
      value:
        - type: value
          value: 48
        - type: value
          value: 32
    output_size:
      type: ref
      value: dimensions

base_score_mlp:
  type: class
  class_name: MLPExtractor
  params:
    input_size:
      type: value
      value: 64
    batch_norm:
      type: ref
      value: batch_norm
    dropout:
      type: ref
      value: dropout
    hidden_sizes:
      type: list
      value:
        - type: value
          value: 32
    output_size:
      type: ref
      value: dimensions

# ====================== MODEL =======================
semantics:
  type: class
  class_name: ReluSemantics
  params:
    max_iters:
      type: ref
      value: max_iters

partial_order:
  type: class
  class_name: LearnedPartialOrder
  params:
    feature_extractors:
      type: list
      value:
        - type: ref
          value: feature_weights
        - type: ref
          value: partial_order_mlp
    comparison_func:
      type: class
      class_name: Subtractor
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: sigmoid

irrelevance:
  type: class
  class_name: RegularIrrelevance
  params:
    compute_partial_order:
      type: ref
      value: partial_order

base_score:
  type: class
  class_name: LearnedBaseScore
  params:
    feature_extractors:
      type: list
      value:
        - type: ref
          value: feature_weights
        - type: ref
          value: base_score_mlp
    activation:
      type: function
      value: sigmoid
    temperature:
      type: value
      value: 1.0

model:
  type: class
  class_name: GradualAACBR
  params:
    gradual_semantics:
      type: ref
      value: semantics
    compute_base_score:
      type: ref
      value: base_score
    irrelevance_edge_weights:
      type: ref
      value: irrelevance
    casebase_edge_weights:
      type: ref
      value: partial_order
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: uni_directional
    dimensions:
      type: ref
      value: dimensions

attacks_defaults_regulariser:
  type: class
  class_name: AttackDefaultsRegulariser
