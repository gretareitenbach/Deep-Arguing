epochs:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "epochs" }
    low: { type: "value", value: 500 }
    high: { type: "value", value: 1500 }
    step: { type: "value", value: 10 }
    log: { type: "value", value: False }

lr:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "lr" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

dag_alpha:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "dag_alpha" }
    low: { type: "value", value: 0.00005 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

gamma_dag:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gamma_dag" }
    low: { type: "value", value: 0.00005 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

max_iters:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "max_iters" }
    low: { type: "value", value: 10 }
    high: { type: "value", value: 60 }
    step: { type: "value", value: 1 }
    log: { type: "value", value: False }

batch_size:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "batch_size" }
    low: { type: "value", value: 1024 }
    high: { type: "value", value: 4096 }
    log: { type: "value", value: True }

temperature:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "temperature" }
    low: { type: "value", value: 0.0005 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

weight_decay:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "weight_decay" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

label_smoothing:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "label_smoothing" }
    low: { type: "value", value: 0.00 }
    high: { type: "value", value: 0.2 }
    step: { type: "value", value: 0.01 }
    log: { type: "value", value: False }


cluster_size:
  type: value
  value: 5

gradient_max_norm:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gradient_max_norm" }
    low: { type: "value", value: 0.1 }
    high: { type: "value", value: 5.0 }
    step: { type: "value", value: 0.2 }
    log: { type: "value", value: False }
