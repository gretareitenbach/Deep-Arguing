epochs:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "epochs" }
    low: { type: "value", value: 100 }
    high: { type: "value", value: 2000 }
    step: { type: "value", value: 1 }
    log: { type: "value", value: False }

lr:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "lr" }
    low: { type: "value", value: 0.0005 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

dag_alpha:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "dag_alpha" }
    low: { type: "value", value: 0.00005 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

gamma_dag:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gamma_dag" }
    low: { type: "value", value: 0.00005 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

max_iters:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "max_iters" }
    low: { type: "value", value: 50 }
    high: { type: "value", value: 150 }
    step: { type: "value", value: 1 }
    log: { type: "value", value: False }

batch_size:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "batch_size" }
