epsilon:
  type: value
  value: 0

temperature:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "temperature" }
    low: { type: "value", value: 0.005 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }


cluster_size:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "cluter_size"}
