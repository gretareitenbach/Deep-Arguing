total_iters:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "total_iters" }
    low: { type: "value", value: 1 }
    high: { type: "value", value: 256 }
    log: { type: "value", value: True }

lr:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "lr" }
    low: { type: "value", value: 0.0001 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

dag_alpha:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "dag_alpha" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

gamma_dag:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gamma_dag" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.001 }
    log: { type: "value", value: True }

gamma_batch_entropy:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gamma_batch_entropy" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.1 }
    log: { type: "value", value: True }

max_iters:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "max_iters" }
    low: { type: "value", value: 30 }
    high: { type: "value", value: 80 }
    step: { type: "value", value: 10 }
    log: { type: "value", value: False }

batch_size:
  type: tune
  tune_type: categorical
  params:
    name: { type: "value", value: "batch_size" }
    choices:
      type: list
      value: [
        {type: value, value: 1024},
        {type: value, value: 512},
        {type: value, value: 256},
      ]


temperature:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "temperature" }
    low: { type: "value", value: 0.0005 }
    high: { type: "value", value: 0.01 }
    log: { type: "value", value: True }

weight_decay:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "weight_decay" }
    low: { type: "value", value: 0.00001 }
    high: { type: "value", value: 0.01 }
    log: { type: "value", value: True }

label_smoothing:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "label_smoothing" }
    low: { type: "value", value: 0.00 }
    high: { type: "value", value: 0.3 }
    step: { type: "value", value: 0.05 }
    log: { type: "value", value: False }

cluster_size:
  type: value
  value: 5

gradient_max_norm:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "gradient_max_norm" }
    low: { type: "value", value: 0.1 }
    high: { type: "value", value: 15.0 }
    step: { type: "value", value: 0.1 }
    log: { type: "value", value: False }

dimensions:
  type: tune
  tune_type: int
  params:
    name: { type: "value", value: "dimensions" }
    low: { type: "value", value: 2 }
    high: { type: "value", value: 32 }
    log: { type: "value", value: True }

batch_norm:
  type: value
  value: False
