# Hyperparameters for CIFAR10 curriculum learning
# AGGRESSIVE configuration for maximum performance
#
# Strategy: Start with more classes, longer training per phase, higher LR,
# stronger new-class emphasis, and better regularization for knowledge retention.
#
# Training 

# =============================================================================
# Training Duration
# =============================================================================

epochs:
  type: value
  value: 350 

# epochs_per_class:
#   type: value
#   value: 10 

max_epochs_per_class:
  type: value
  value: 35 

min_epochs_per_class:
  type: value
  value: 5 

accuracy_threshold:
  type: value
  value: 0.85


# =============================================================================
# Curriculum Learning Parameters
# =============================================================================

new_class_weight:
  type: value
  value: 5

decay_epochs:
  type: value
  value:  5 

reset_optimizer:
  type: value
  value: True  

initial_classes:
  type: value
  value: 2  # Start with 2 classes for meaningful initial learning

# =============================================================================
# Optimizer Parameters
# =============================================================================

lr:
  type: value
  # value: 0.025 
  value: 0.5 

weight_decay:
  type: value
  value: 0.04

# =============================================================================
# Regularization
# =============================================================================

gamma_dag:
  type: value
  value: 0.08 

dag_alpha:
  type: value
  value: 0.0006 

label_smoothing:
  type: value
  value: 0.1 

# =============================================================================
# Model Architecture
# =============================================================================

max_iters:
  type: value
  value: 60  # More iterations for convergence with growing graph

temperature:
  type: value
  value: 0.25  # Lower temperature = sharper distinctions

dimensions:
  type: value
  value: 24  # Higher dimensions for more expressive representations

batch_norm:
  type: value
  value: True  # Essential for handling distribution shift

# =============================================================================
# Training Mechanics
# =============================================================================

cluster_size:
  type: value
  value: 5  

batch_size:
  type: value
  # value: 1024 
  value: 512

gradient_max_norm:
  type: value
  value: 1.0 
