# ====================== Hyperparameters =======================

epochs:
  type: value
  value: 1024

lr:
  type: value
  value: 0.007

batch_size:
  type: value
  value: 1024
  # value: 1024
  # value: 256

gradient_max_norm:
  type: value
  value: 0.1

weight_decay:
  type: value
  value: 0.09

label_smoothing:
  type: value
  value: 0.0

first_layer:
  type: value
  value: 128

second_layer:
  type: value
  value: 64

third_layer:
  type: value
  value: 64
  
fourth_layer:
  type: value
  value: 64







# ====================== Regulariser =======================

regularisers:
  type: class
  class_name: CriterionList

# ====================== LOSSES ======================
