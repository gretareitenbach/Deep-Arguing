losses:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: cross_entropy
            - type: value
              value: 1

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: "IdentityCluster"

build_new_cases:
  type: function
  value: "use_train"

# ====================== MODEL =======================

model:
  type: class
  class_name: NeuralNetworkBaseline
  params:
    input_size:
      type: data_ref
      value: no_features
    hidden_sizes:
      type: list
      value:
        - type: ref
          value: first_layer
        - type: ref
          value: second_layer
        - type: ref
          value: third_layer
        - type: ref
          value: fourth_layer
    output_size:
      type: data_ref
      value: no_classes

