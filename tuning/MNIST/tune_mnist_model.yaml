dag_regulariser:
  type: class
  class_name: DAGRegulariser
  params:
    alpha:
      type: ref
      value: dag_alpha
    

regularisers:
  type: class
  class_name: "RegulariserList"
  params:
    regularisers:
      type: list
      value:
        [
          {
            type: list,
            value:
              [
                { type: ref, value: "dag_regulariser" },
                { type: ref, value: gamma_dag },
              ],
          },
        ]

trainer:
  type: class
  class_name: "SimpleTrainer"

build_casebase:
  type: class
  class_name: "kMeansCluster"
  params:
    cluster_size:
      type: ref
      value: cluster_size

build_new_cases:
  type: function
  value: "use_train"

train_settings:
  type: dict
  value:
    criterion_factory:
      type: function
      value: "cross_entropy"
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: "AdamW"
      model: "model"
      params:
        lr:
          type: ref
          value: lr
    regulariser:
      type: ref
      value: "regularisers"
    batch_size:
      type: value
      value: 7680

feature_weights:
  type: class
  # class_name: "FeatureWeightedExtractor"
  # params:
  #   no_features:
  #     type: data_ref
  #     value: "no_features"
  class_name: "MLPExtractor"
  params:
    input_size:
      type: data_ref
      value: "no_features"
    hidden_sizes:
      type: ref
      value: mlp_hidden_sizes
    output_size:
      type: value
      value: 1

scaler:
  type: class
  class_name: "Scaler"
  params:
    no_features:
      type: data_ref
      value: "no_features"

semantics:
  type: class
  class_name: "ReluSemantics"
  params:
    max_iters:
      type: ref
      value: max_iters
    epsilon:
      type: ref
      value: epsilon

partial_order:
  type: class
  class_name: "LearnedPartialOrder"
  params:
    feature_extractors:
      type: list
      value: [{ type: ref, value: "feature_weights" }]
    comparison_func:
      type: class
      class_name: "Subtractor"
      params:
        temperature:
          type: ref
          value: temperature
        activation:
          type: function
          value: "sigmoid"

irrelevance:
  type: class
  class_name: "RegularIrrelevance"
  params:
    compute_partial_order:
      type: ref
      value: "partial_order"

base_score:
  type: class
  class_name: "LearnedBaseScore"
  params:
    feature_extractors:
      type: list
      value:
        [
          { type: ref, value: "feature_weights" },
          { type: ref, value: "scaler" },
        ]
    activation:
      type: function
      value: "sigmoid"

model:
  type: class
  class_name: "GradualAACBR"
  params:
    gradual_semantics:
      type: ref
      value: "semantics"
    compute_base_score:
      type: ref
      value: "base_score"
    irrelevance_edge_weights:
      type: ref
      value: "irrelevance"
    casebase_edge_weights:
      type: ref
      value: "partial_order"
    use_symmetric_attacks:
      type: value
      value: false
    defaults_not_attack:
      type: value
      value: true
    use_blockers:
      type: value
      value: true
    use_supports:
      type: value
      value: true
    post_process_func:
      type: function
      value: "identity"
