epochs:
  type: value
  value: 32

lr:
  type: tune
  tune_type: float
  params:
    name: { type: "value", value: "lr" }
    low: { type: "value", value: 0.0001 }
    high: { type: "value", value: 0.01 }
    log: { type: "value", value: True }

dag_alpha:
  type: value
  value: 0.001

gamma_dag:
  type: tune
  tune_type: categorical
  params:
    name: { type: "value", value: "gamma_dag" }
    choices:
      type: list
      value: [
        {type: value, value: 0},
        {type: value, value: 0.00001},
        {type: value, value: 0.0001},
        {type: value, value: 0.001},
        {type: value, value: 0.01},
        {type: value, value: 0.1},
      ]

