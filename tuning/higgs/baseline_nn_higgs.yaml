# ====================== Hyperparameters =======================
epochs:
  type: value
  value: 32

lr:
  type: value
  # value: 0.0017516780759110426
  value: 0.0005

gamma_dag:
  type: value
  value: 0.00001

gamma_cbr:
  type: value
  value: 0.01

gamma_batch_entropy:
  type: value
  value: 0.01

gamma_cp:
  type: value
  value: 0.01

gamma_sparsity:
  type: value
  value: 0.01

max_iters:
  type: value
  value: 10

temperature:
  type: value
  # value: 100
  value: 100

dag_alpha:
  type: value
  value: 0.001

cluster_size:
  type: value
  value: 5

batch_size:
  type: value
  value: 2048
  # value: 1024
  # value: 256

gradient_max_norm:
  type: value
  value: 4.5

weight_decay:
  type: value
  value: 0.001

label_smoothing:
  type: value
  value: 0.0

batch_norm:
  type: value
  value: False

rescale_edges:
  type: value
  value: false

t_norm_str:
  type: value
  value: ProductTNorm
  # value: LukasiewiczTNorm

first_layer:
  type: value
  # value: 128
  value: 512

second_layer:
  type: value
  # value: 64
  value: 256

third_layer:
  type: value
  # value: 32
  value: 128

rand_weight:
  type: value
  value: 0

noise_value:
  type: value
  value: 0




# ====================== Regulariser =======================

regularisers:
  type: class
  class_name: CriterionList

# ====================== LOSSES ======================
cross_entropy:
  type: class
  class_name: TorchLoss
  params:
    class_name:
      type: value
      value: CrossEntropyLoss
    label_smoothing:
      type: ref
      value: label_smoothing


losses:
  type: class
  class_name: CriterionList
  params:
    criteria:
      type: list
      value:
        - type: list
          value:
            - type: ref
              value: cross_entropy
            - type: value
              value: 1

# ================ TRAINING SETTINGS =================
trainer:
  type: class
  class_name: SimpleTrainer
  params:
    criterion:
      type: ref
      value: losses
    epochs:
      type: ref
      value: epochs
    optimizer:
      type: class
      sub_type: optim
      class_name: AdamW
      model: model
      params:
        lr:
          type: ref
          value: lr
        weight_decay:
          type: ref
          value: weight_decay
    regulariser:
      type: ref
      value: regularisers
    batch_size:
      type: ref
      value: batch_size
    gradient_max_norm:
      type: ref
      value: gradient_max_norm
    validation_log_strategy:
      type: class
      class_name: StandardValidationLog

build_casebase:
  type: class
  class_name: "IdentityCluster"

build_new_cases:
  type: function
  value: "use_train"

# ====================== MODEL =======================

model:
  type: class
  class_name: NeuralNetworkBaseline
  params:
    input_size:
      type: data_ref
      value: no_features
    hidden_sizes:
      type: list
      value:
        - type: ref
          value: first_layer
        - type: ref
          value: second_layer
        - type: ref
          value: third_layer
    output_size:
      type: value
      value: 2

