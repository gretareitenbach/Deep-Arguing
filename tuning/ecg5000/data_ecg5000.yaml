data:
  type: data
  sub_type: tabular
  params:
    target_field:
      type: value
      value: 0
    path:
      type: value
      value: "./data/ECG5000/ECG5000_TRAIN.tsv"
    test_path:
      type: value
      value: "./data/ECG5000/ECG5000_TEST.tsv"
    has_header:
      type: value
      value: false
    continuous_cols:
      type: range
      value:
        - { type: value, value: 0 }
        - { type: value, value: 140 }
    sep:
      type: value
      value: "\t"

data_pre_process:
  type: dict
  value:
    pre_process_func:
      type: function
      value: "no_normalize"
